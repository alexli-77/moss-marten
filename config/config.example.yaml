assistant:
  name: "moss-marten"
  language: "en"
  tone: "direct, calm, practical"

user:
  display_name: "User"
  timezone: "UTC"

llm:
  provider: "openai"
  model: "gpt-4.1-mini"

channels:
  review:
    type: "discord"
    channel_id_env: "DISCORD_REVIEW_CHANNEL_ID"

workflows:
  daily_review:
    enabled: true
    time: "21:30"
    channel: "review"
  daily_plan:
    enabled: true
    time: "08:00"
    channel: "review"

triggers:
  discord_commands:
    enabled: true
    channel: "review"
    daily_review_patterns:
      - "^review$"
      - "^start review$"
      - "^run review$"
      - "^daily review$"
      - "^开始 review$"
      - "^复盘$"
      - "^总结$"
    daily_plan_patterns:
      - "^start plan$"
      - "^run plan$"
      - "^today plan$"
      - "^出 todo$"

sources:
  discord_history:
    enabled: false
    limit: 50
  github:
    enabled: false
  calendar_snapshot:
    enabled: false
    path: "./data/snapshots/calendar/today-agenda.json"
  tasks_snapshot:
    enabled: false
    path: "./data/snapshots/tasks/my-tasks.json"
  vault_snapshots:
    enabled: true
    root: "./data/vault/_snapshots"
    max_files: 20
  vault_markdown:
    enabled: true
    root: "./data/vault"
    max_files: 40
    max_bytes_per_file: 12000
  vault_gate:
    enabled: false

memory:
  long_term_path: "./data/memory/long-term.md"
  daily_dir: "./data/memory/daily"
